# Public training config for standard CNN experiments on the CS dataset.
# Expects a train/test folder layout such as:
#   ./data/CS_Xplots_2019_2023_train
#   ./data/CS_Xplots_2019_2023_test

experiment_name: "cs_cnn"
seed: 0
save_dir: "./experiments"
cross_valid: False

data:
  dataset_paths:
    - "./data/CS_Xplots_2019_2023_train"
  index_file_names:
    - "CS_Xplots_2019_23_NEW02OCT24.csv"
  metadata: True
  batch_size: 32
  shuffle: True
  num_workers: 0
  data_split:
    valid_split: 0.2
    if_grouped: True
    num_fold: 5
    first_cv_only: True
    split_seed: 42
  use_l2_label: False
  preprocessing:
    normalise: True
    normalise_params:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
    resize: 256
    augmentations:
      crop: 224
      bottom_crop: True
      flip: True
      rotation: True
    multi_views:
      edge: False
      supcon: False

model:
  name: "resnext"
  pretrained: True
  model_config: "50"
  input_size: 224
  num_classes: 20
  dropout: 0.5

training:
  use_l2_label: False
  supcon: False
  supcon_conf:
    pretrain: False
    temp: 0.1
    prt_dir: "./experiments/cs_supcon_pretrain/checkpoints"
    prt_filename: "checkpoint_50.pth"
  num_epochs: 50
  optimiser:
    type: "sgd"
    lr: 0.001
    weight_decay: 1.0e-5
  loss_function: "CE"
  early_stopping:
    patience: 10
    min_delta: 0.001
    save_best: False
  scheduler:
    type: "cosine"
    config:
      step_size: 10
      gamma: 0.1
      reduced_factor: 0.1
      reduced_patience: 5
    verbose: False
  checkpoint:
    save_freq: 5
    save_checkpoint: False
  verbose: False

evaluation:
  l2_metrics: False

logging:
  log_interval: 10
  save_logs: True
